stages:
  - validate

default:
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(feature|refactor|bugfix|hotfix)\/.+/

check:
  stage: validate
  script:
    - npm ci
    - npm run check

lint:
  stage: validate
  script:
    - npm ci
    - npm run lint

test:
  stage: validate
  script:
    - npm ci
    - npm run test
